<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dinosaurios: Noticias, Fotos y Nuevos Fósiles</title>
    <link rel="stylesheet" href="CSS/Estilos.css">
</head>

<body>

    <header class="encabezado-fijo">
        <div class="contenedor-header">
            <h1>DinoCiencia</h1>

            <nav class="menu-navegacion" aria-label="Navegación principal">
                <a href="index.html">Inicio</a>
                <a href="Registros.html">Registros</a>
                <a href="formulario.html">Formulario</a>
                <a href="Habitat.html">Hábitat</a>
            </nav>

            <div class="theme-switch-wrapper">
                <button id="theme-toggle" class="theme-toggle-btn" aria-label="Cambiar tema (oscuro/claro)"
                    title="Cambiar tema">
                    <!-- Icono de Sol (Claro) -->
                    <svg class="sun-and-moon" aria-hidden="true" width="24" height="24" viewBox="0 0 24 24">
                        <mask class="moon-mask" id="moon-mask">
                            <rect x="0" y="0" width="100%" height="100%" fill="white" />
                            <circle cx="24" cy="10" r="6" fill="black" />
                        </mask>
                        <circle class="sun-main" cx="12" cy="12" r="6" mask="url(#moon-mask)" fill="currentColor" />
                        <g class="sun-beams" stroke="currentColor">
                            <line x1="12" y1="1" x2="12" y2="3" />
                            <line x1="12" y1="21" x2="12" y2="23" />
                            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
                            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
                            <line x1="1" y1="12" x2="3" y2="12" />
                            <line x1="21" y1="12" x2="23" y2="12" />
                            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
                            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
                        </g>
                    </svg>
                </button>
            </div>
        </div>
    </header>
    <main>
        <h2 id="formTitulo">Nuevo Registro de Fósil</h2>

        <section class="contenedor-formulario" style="margin-bottom: 30px;">
            <form id="dinoForm"
                style="display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; background: #f4f4f4; padding: 20px; border-radius: 8px;">
                <input type="text" id="especie" placeholder="Especie (ej: T-Rex)" required>
                <input type="text" id="familia" placeholder="Familia" required>
                <select id="locomocion">
                    <option value="Bípeda">Bípeda</option>
                    <option value="Cuadrúpeda">Cuadrúpeda</option>
                    <option value="Vuelo">Vuelo</option>
                    <option value="Acuática">Acuática</option>
                </select>
                <input type="text" id="caracteristicas" placeholder="Características clave">
                <input type="url" id="audioUrl" placeholder="URL del audio (mp3)">

                <div class="botones-form">
                    <button type="submit" id="btnGuardar" class="btn-guardar">💾 Guardar</button>
                    <button type="button" id="btnCancelar" onclick="cancelarEdicion()" style="display:none;"
                        class="btn-cancelar">❌ Cancelar</button>
                </div>
            </form>
        </section>

        <h2>Clasificación Taxonómica por Especie</h2>
        <div id="mensaje" class="mensaje" style="display: none; margin: 10px auto; width: 80%; text-align: center;">
        </div>

        <div class="contenedor-tabla">
            <table>
                <thead>
                    <tr>
                        <th>Especie</th>
                        <th>Tipo / Familia</th>
                        <th>Locomoción</th>
                        <th>Características Clave</th>
                        <th>Sonido</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="cuerpoTabla">
                </tbody>
            </table>
        </div>
    </main>
    <button id="btn-ir-arriba" title="Volver arriba">&#11165;</button>

    <footer id="pie-pagina">
        <p>Derechos reservados &copy; 2026 Expedición Paleontológica Digital.</p>
        <div class="seccion-likes">
            <span>¿Te gusta este sitio?</span>
            <button class="btn-like" id="btn-like">&#10084; <span id="texto-like">Me gusta</span></button>
            <span id="contador-likes">0</span>
        </div>
    </footer>

    <script src="JS/app.js"></script>

</body>

</html>
